<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AdLens — Ad row preview (review before deploy)</title>
<style>
:root{--ink:#0f1b2d;--paper:#f5f6f8;--card:#fff;--line:#e5e8ee;--text:#1b2433;--muted:#6b7585;--faint:#9aa3b2;--green:#16a34a;--green-bg:#e7f6ec;--amber:#c9821b;--amber-bg:#fbf1df;--red:#d7263d;--red-bg:#fce9ec}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:var(--paper);color:var(--text);font-size:14px;line-height:1.4}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
.banner{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--muted)}
.banner b{color:var(--ink)}
h1{font-size:20px;margin:0 0 4px;letter-spacing:-.3px}
.sub{font-size:13px;color:var(--muted);margin:0 0 20px}
.ad-list{display:flex;flex-direction:column;gap:10px}
.ad-row{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.ad-row.open{border-color:#c8d0dc;box-shadow:0 2px 12px rgba(15,27,45,.06)}
.ad-body{display:grid;grid-template-columns:96px 1fr;gap:0;align-items:stretch}
.hero-wrap{position:relative;width:96px;height:96px;flex-shrink:0;background:#eef1f6;cursor:pointer;overflow:hidden;border-right:1px solid var(--line);align-self:center;margin:10px 0 10px 10px;border-radius:8px}
.hero-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.hero-wrap:hover img{transform:scale(1.05)}
.hero-wrap .hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase}
.hero-overlay{position:absolute;inset:0;background:rgba(15,27,45,0);display:flex;align-items:center;justify-content:center;transition:background .15s;pointer-events:none;border-radius:8px}
.hero-wrap:hover .hero-overlay{background:rgba(15,27,45,.32)}
.hero-icon{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transform:scale(.85);transition:opacity .15s,transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hero-wrap:hover .hero-icon{opacity:1;transform:scale(1)}
.hero-badge{position:absolute;top:5px;left:5px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.92)}
.hero-badge.keep{color:#0f7a37}.hero-badge.watch{color:#7a5410}.hero-badge.remove{color:#a8132a}
.ad-main{display:flex;flex-direction:column;min-width:0;padding:10px 12px 10px 8px}
.ad-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;cursor:pointer;user-select:none;padding:2px 0 8px}
.ad-top:hover .ad-title{color:#0a4d8c}
.ad-id{display:flex;align-items:flex-start;gap:7px;min-width:0}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);margin-top:6px;flex-shrink:0}
.ad-title{font-weight:700;font-size:14px;line-height:1.3;transition:color .12s}
.ad-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.35px;padding:2px 6px;border-radius:4px;background:#eef1f6;color:#4a5568;margin-right:4px}
.ad-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pill{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:5px 10px;border-radius:20px}
.pill.scale{background:var(--green-bg);color:#0f7a37}
.pill.watch{background:var(--amber-bg);color:#7a5410}
.pill.kill,.pill.remove{background:var(--red-bg);color:#a8132a}
.pill.keep{background:var(--green-bg);color:#0f7a37}
.chev{width:28px;height:28px;border:1px solid var(--line);border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);transition:transform .15s}
.ad-row.open .chev{transform:rotate(180deg)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;cursor:pointer}
.stat-tile{background:#f8f9fb;border:1px solid var(--line);border-radius:8px;padding:7px 9px}
.stat-tile.primary{background:#fff;border-color:#c8e6d0;box-shadow:inset 3px 0 0 var(--green)}
.stat-tile.warn{background:#fffbf5;border-color:#efd9ad;box-shadow:inset 3px 0 0 var(--amber)}
.stat-tile.bad-tile{background:#fff8f9;border-color:#f0c4cb;box-shadow:inset 3px 0 0 var(--red)}
.stat-tile .k{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700}
.stat-tile .v{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.2;margin:2px 0}
.stat-tile .j{font-size:10px;font-weight:700;line-height:1.2}
.stat-tile .j.good{color:var(--green)}.stat-tile .j.warn{color:var(--amber)}.stat-tile .j.bad{color:var(--red)}.stat-tile .j.neutral{color:var(--muted)}
.stat-tile .bar{height:3px;background:#e8ebf0;border-radius:2px;margin-top:5px;overflow:hidden}
.stat-tile .bar i{display:block;height:100%;border-radius:2px;background:var(--green)}
.stat-tile.warn .bar i{background:var(--amber)}.stat-tile.bad-tile .bar i{background:var(--red)}
.ad-strip{display:flex;align-items:flex-end;gap:10px;padding-top:2px;border-top:1px solid #f0f2f5}
.strip-label{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.35px;margin-bottom:4px}
.other-thumbs{display:flex;gap:6px;align-items:flex-end}
.thumb-card{position:relative;width:52px;cursor:pointer;flex-shrink:0}
.thumb-card img,.thumb-card .ph{width:52px;height:52px;border-radius:7px;object-fit:cover;background:#eef1f6;border:2px solid var(--line);display:block;transition:transform .12s,border-color .12s}
.thumb-card:hover img,.thumb-card:hover .ph{transform:scale(1.04)}
.thumb-card.keep img,.thumb-card.keep .ph{border-color:var(--green)}
.thumb-card.watch img,.thumb-card.watch .ph{border-color:var(--amber)}
.thumb-card.remove img,.thumb-card.remove .ph{border-color:var(--red)}
.thumb-card .ph{display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--faint);font-weight:700}
.thumb-verdict{font-size:8px;font-weight:800;text-transform:uppercase;text-align:center;margin-top:3px;letter-spacing:.2px}
.thumb-card.keep .thumb-verdict{color:var(--green)}.thumb-card.watch .thumb-verdict{color:var(--amber)}.thumb-card.remove .thumb-verdict{color:var(--red)}
.counts{display:flex;gap:5px;margin-left:auto;align-self:center}
.chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted)}
.chip.keep{color:#0f7a37;border-color:#c8e6d0;background:var(--green-bg)}
.chip.remove{color:#a8132a;border-color:#f0c4cb;background:var(--red-bg)}
.chip.watch{color:#7a5410;border-color:#efd9ad;background:var(--amber-bg)}
.ad-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--line);background:#fafbfc;margin-left:106px}
.ad-row.open .ad-detail{display:block}
.action-bar{display:flex;align-items:flex-start;gap:10px;padding:12px 0;font-size:13px}
.action-bar .pill{flex-shrink:0;margin-top:1px}
.action-bar p{margin:0;color:var(--text);font-weight:500;line-height:1.45}
.creative-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.c-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.c-card.remove{border-color:#f0c4cb}.c-card.keep{border-color:#c8e6d0}.c-card.watch{border-color:#efd9ad}
.c-media{position:relative;width:100%;aspect-ratio:1/1;border-radius:8px;overflow:hidden;background:#eef1f6;cursor:pointer}
.c-media img{width:100%;height:100%;object-fit:cover;display:block}
.c-media .c-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--faint);font-weight:700}
.c-media .m-overlay{position:absolute;inset:0;background:rgba(15,27,45,0);display:flex;align-items:center;justify-content:center;transition:background .15s}
.c-media:hover .m-overlay{background:rgba(15,27,45,.3)}
.c-media .m-icon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .15s}
.c-media:hover .m-icon{opacity:1}
.c-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.c-name{font-size:12px;font-weight:700;line-height:1.3}
.c-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.cm{background:#f8f9fb;border-radius:6px;padding:5px 6px;text-align:center;border:1px solid #eef1f6}
.cm-k{display:block;font-size:8px;text-transform:uppercase;letter-spacing:.35px;color:var(--faint);font-weight:700}
.cm-v{display:block;font-size:13px;font-weight:800;margin:1px 0;font-variant-numeric:tabular-nums}
.cm-j{display:block;font-size:9px;font-weight:700}
.cm-j.good{color:var(--green)}.cm-j.warn{color:var(--amber)}.cm-j.bad{color:var(--red)}.cm-j.neutral{color:var(--muted)}
.c-note{font-size:11px;color:var(--text);line-height:1.4;padding:8px;background:#f8f9fb;border-radius:6px;border-left:3px solid var(--line)}
.c-card.keep .c-note{border-left-color:var(--green)}.c-card.remove .c-note{border-left-color:var(--red)}.c-card.watch .c-note{border-left-color:var(--amber)}
.lightbox{position:fixed;inset:0;background:rgba(15,27,45,.88);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px}
.lightbox.open{display:flex}
.lightbox-inner{position:relative;max-width:min(920px,96vw);max-height:90vh;width:100%}
.lightbox-inner img,.lightbox-inner video{max-width:100%;max-height:85vh;border-radius:10px;display:block;margin:0 auto;background:#000}
.lightbox-cap{margin-top:10px;text-align:center;color:#fff;font-size:13px;font-weight:600}
.lightbox-x{position:absolute;top:-12px;right:-12px;width:36px;height:36px;border:none;border-radius:50%;background:#fff;color:var(--ink);font-size:18px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.25);z-index:2}
@media(max-width:820px){.creative-grid{grid-template-columns:1fr}.stat-grid{grid-template-columns:repeat(2,1fr)}.ad-detail{margin-left:0}}
@media(max-width:720px){
  .ad-body{grid-template-columns:80px 1fr}
  .hero-wrap{width:80px;height:80px;margin:8px 0 8px 8px}
  .thumb-card,.thumb-card img,.thumb-card .ph{width:44px;height:44px}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Ad row layout — preview v3</h1>
  <p class="sub">Smaller hero · bigger secondary creatives · metrics with plain-English labels.</p>
  <div class="banner"><b>Stats tiles</b> show the number + a judgment (Strong / Weak / High cost) + bar vs account average — not raw dumps.<br/><b>Click row</b> to expand full creative comparison.</div>
  <div class="ad-list" id="list"></div>
</div>
<div class="lightbox" id="lb" onclick="if(event.target===this)closeLb()">
  <div class="lightbox-inner">
    <button class="lightbox-x" onclick="closeLb()" aria-label="Close">×</button>
    <div id="lbMedia"></div>
    <div class="lightbox-cap" id="lbCap"></div>
  </div>
</div>
<script>
const BENCH={ctr:2.8,costCall:8,costVisit:1.2};
const ADS=[
  {name:"walkinref1011",cat:"Walk-in / cold room",goal:"Site visitors",live:"227d",verdict:"scale",label:"Scale",
   ctr:2.69,spend:1731,calls:0,lpv:2081,cost:0.83,
   action:"Increase budget 20–50%. Duplicate the hook in new ad sets.",
   assets:[
    {n:"walkin-video-1",t:"Walk-in warehouse footage",ctr:3.2,spend:980,calls:48,cost:20.4,v:"keep",note:"Best performer — leave running.",hero:true,
     thumb:"https://images.unsplash.com/photo-1565814636199-ae8133055c1c?w=600&h=600&fit=crop",type:"video",
     video:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"},
    {n:"walkin-static-2",t:"Walk-in price graphic",ctr:2.1,spend:420,calls:19,cost:22.1,v:"watch",note:"Lower CTR — test a new headline.",bad:true,
     thumb:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=400&fit=crop"},
    {n:"walkin-static-3",t:"Walk-in lifestyle shot",ctr:1.8,spend:331,calls:11,cost:30.1,v:"remove",note:"Lowest CTR — pause and reallocate.",bad:true,
     thumb:"https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=400&h=400&fit=crop"}
   ]},
  {name:"medalalldoor-us-call",cat:"Reach-in refrigeration",goal:"Phone calls",live:"108d",verdict:"watch",label:"Watch",
   ctr:2.25,spend:883,calls:83,cost:10.64,badCtr:true,
   action:"Hold budget steady. Review in 7 days or test one new headline.",
   assets:[
    {n:"3-door promo",t:"10% OFF refrigerators",ctr:2.38,spend:41,calls:5,cost:8.24,v:"keep",note:"Best $/call in this ad.",hero:true,
     thumb:"https://images.unsplash.com/photo-1571175443880-49ae1f784fbe?w=600&h=600&fit=crop"},
    {n:"medal collage",t:"Multi-door layout",ctr:2.25,spend:842,calls:78,cost:10.79,v:"remove",note:"5.7× worse $/call — remove in Meta.",bad:true,
     thumb:"https://images.unsplash.com/photo-1556911220-bff31c812dba?w=400&h=400&fit=crop"}
   ]},
  {name:"New Engagement Ad",cat:"Hotel / bedding",goal:"Phone calls",live:"35d",verdict:"scale",label:"Scale",
   ctr:3.81,spend:797,calls:108,cost:7.38,
   action:"Increase budget 20–50% on this creative.",
   assets:[
    {n:"mattress warehouse",t:"Bulk mattress display",ctr:4.1,spend:542,calls:72,cost:7.53,v:"keep",note:"Top volume + efficiency.",hero:true,
     thumb:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=600&h=600&fit=crop"},
    {n:"bed frame stack",t:"Platform beds",ctr:3.2,spend:255,calls:36,cost:7.08,v:"keep",note:"Solid — keep running.",
     thumb:"https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=400&h=400&fit=crop"},
    {n:"ChatGPT variant",t:"Generic hotel shot",ctr:1.9,spend:89,calls:0,cost:null,v:"remove",note:"$89 spent, zero calls — remove.",bad:true,
     thumb:"https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&h=400&fit=crop"}
   ]},
  {name:"New Engagement Ad",cat:"Marketplace",goal:"Phone calls",live:"143d",verdict:"scale",label:"Scale",
   ctr:8.09,spend:741,calls:166,cost:4.46,goodCtr:true,
   action:"Scale aggressively — primary budget driver.",
   assets:[
    {n:"kitchen collage",t:"Equipment marketplace grid",ctr:8.5,spend:598,calls:143,cost:4.18,v:"keep",note:"Best on account — clone this format.",good:true,hero:true,
     thumb:"https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=600&h=600&fit=crop"},
    {n:"single fryer",t:"One product hero",ctr:4.2,spend:143,calls:23,cost:6.22,v:"remove",note:"Weaker than collage — cut.",bad:true,
     thumb:"https://images.unsplash.com/photo-1574269904911-7f1d51b2e8e8?w=400&h=400&fit=crop"}
   ]}
];
function esc(s){return (s||"").replace(/[&<>"]/g,c=>"&amp;&lt;&gt;&quot;"[c]);}
function usd(n){return n==null?"—":"$"+Number(n).toFixed(n<10?2:0);}
function pctBar(val,bench,higherBetter){
  const ratio=higherBetter?val/bench:bench/val;
  return Math.min(100,Math.max(8,Math.round(ratio*55)));
}
function judgeCtr(v){
  if(v>=5)return{t:"Excellent",c:"good",tile:"primary",pct:pctBar(v,BENCH.ctr,true)};
  if(v>=3)return{t:"Solid",c:"good",tile:"",pct:pctBar(v,BENCH.ctr,true)};
  if(v>=2)return{t:"Average",c:"neutral",tile:"",pct:pctBar(v,BENCH.ctr,true)};
  return{t:"Weak CTR",c:"bad",tile:"bad-tile",pct:pctBar(v,BENCH.ctr,true)};
}
function judgeCost(v,isVisit){
  const b=isVisit?BENCH.costVisit:BENCH.costCall;
  if(v<=b*.75)return{t:"Strong",c:"good",tile:"primary",pct:pctBar(v,b,false)};
  if(v<=b)return{t:"On target",c:"good",tile:"",pct:pctBar(v,b,false)};
  if(v<=b*1.35)return{t:"Slightly high",c:"warn",tile:"warn",pct:pctBar(v,b,false)};
  return{t:"High cost",c:"bad",tile:"bad-tile",pct:pctBar(v,b,false)};
}
function judgeVol(v,isVisit){
  if(isVisit){if(v>=1500)return{t:"High traffic",c:"good",tile:"primary",pct:88};if(v>=800)return{t:"Good volume",c:"good",tile:"",pct:65};return{t:"Building",c:"neutral",tile:"",pct:40};}
  if(v>=120)return{t:"Strong",c:"good",tile:"primary",pct:90};if(v>=60)return{t:"Decent",c:"good",tile:"",pct:60};return{t:"Low volume",c:"warn",tile:"warn",pct:35};
}
function judgeSpend(v){
  if(v>=1200)return{t:"Well tested",c:"good",tile:"",pct:85};if(v>=500)return{t:"Enough data",c:"neutral",tile:"",pct:60};return{t:"Still learning",c:"warn",tile:"warn",pct:35};
}
function statTile(k,v,j,tile){
  return `<div class="stat-tile ${tile||""}"><div class="k">${k}</div><div class="v">${v}</div><div class="j ${j.c}">${j.t}</div><div class="bar"><i style="width:${j.pct}%"></i></div></div>`;
}
function hero(a){return a.assets.find(x=>x.hero)||a.assets.find(x=>x.v==="keep")||a.assets[0];}
function others(a,h){return a.assets.filter(x=>x!==h);}
function counts(a){const c={keep:0,watch:0,remove:0};a.assets.forEach(x=>c[x.v]++);return c;}
function mediaIcon(x){return x.type==="video"?"▶":"⤢";}
function cardMediaHTML(x){
  if(x.thumb)return `<img src="${x.thumb}" alt=""><div class="m-overlay"><span class="m-icon">${mediaIcon(x)}</span></div>`;
  return `<div class="c-ph">${x.v.toUpperCase()}</div>`;
}
function cmBlock(k,val,j){return `<div class="cm"><span class="cm-k">${k}</span><span class="cm-v">${val}</span><span class="cm-j ${j.c}">${j.t}</span></div>`;}
function openMedia(x){
  const box=document.getElementById("lbMedia"), cap=document.getElementById("lbCap");
  cap.textContent=x.n+" — "+x.t;
  if(x.type==="video"&&x.video)box.innerHTML=`<video src="${x.video}" poster="${x.thumb||""}" controls autoplay playsinline></video>`;
  else if(x.thumb)box.innerHTML=`<img src="${x.thumb.replace(/w=\d+/,"w=1200")}" alt="">`;
  else return;
  document.getElementById("lb").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeLb(){document.getElementById("lb").classList.remove("open");document.getElementById("lbMedia").innerHTML="";document.body.style.overflow="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLb();});
function rowHTML(a,i){
  const c=counts(a), h=hero(a), rest=others(a,h), isVisit=a.goal.includes("Site");
  const pv=isVisit?a.lpv:a.calls;
  const jCtr=judgeCtr(a.ctr), jCost=judgeCost(a.cost,isVisit), jVol=judgeVol(pv,isVisit), jSpend=judgeSpend(a.spend);
  const costLbl=isVisit?"Cost / visit":"Cost / call";
  const volLbl=isVisit?"Landing views":"Phone calls";
  const stats=statTile("CTR",a.ctr+"%",jCtr,jCtr.tile)
    +statTile("Spend",usd(a.spend),jSpend,jSpend.tile)
    +statTile(volLbl,pv.toLocaleString(),jVol,jVol.tile)
    +statTile(costLbl,usd(a.cost),jCost,jCost.tile);
  const thumbs=rest.map(x=>{
    const xi=a.assets.indexOf(x);
    const lbl=x.v==="remove"?"Remove":x.v==="keep"?"Keep":"Watch";
    return `<div class="thumb-card ${x.v}" onclick="event.stopPropagation();openMedia(ADS[${i}].assets[${xi}])">
      ${x.thumb?`<img src="${x.thumb}" alt="">`:`<div class="ph">${lbl.slice(0,3)}</div>`}
      <div class="thumb-verdict">${lbl}</div></div>`;
  }).join("");
  const grid=a.assets.map((x,xi)=>{
    const jc=judgeCtr(x.ctr), jsp=judgeSpend(x.spend);
    const jcs=x.cost!=null?judgeCost(x.cost,isVisit):{t:"—",c:"neutral"};
    return `<div class="c-card ${x.v}">
      <div class="c-media" onclick="event.stopPropagation();openMedia(ADS[${i}].assets[${xi}])">${cardMediaHTML(x)}</div>
      <div class="c-head"><div class="c-name">${esc(x.n)}</div><span class="pill ${x.v}">${x.v==="remove"?"Remove":x.v==="keep"?"Keep":"Watch"}</span></div>
      <div class="c-metrics">${cmBlock("CTR",x.ctr+"%",jc)}${cmBlock("Spend",usd(x.spend),jsp)}${cmBlock(isVisit?"Views":"Calls",(x.calls||x.lpv||0).toString(),jVol)}</div>
      <div class="c-note">${esc(x.note)}</div></div>`;
  }).join("");
  return `<article class="ad-row" data-i="${i}">
    <div class="ad-body">
      <div class="hero-wrap" onclick="event.stopPropagation();openMedia(ADS[${i}].assets[${a.assets.indexOf(h)}])">
        ${h.thumb?`<img src="${h.thumb}" alt="">`:`<div class="hero-ph">${h.v}</div>`}
        <span class="hero-badge ${h.v}">${h.v==="remove"?"Remove":h.v==="keep"?"Keep":"Watch"}</span>
        <div class="hero-overlay"><span class="hero-icon">${mediaIcon(h)}</span></div>
      </div>
      <div class="ad-main">
        <div class="ad-top" onclick="toggle(${i})">
          <div class="ad-id"><span class="live-dot"></span><div>
            <div class="ad-title">${esc(a.name)}</div>
            <div class="ad-meta"><span class="tag">${esc(a.cat)}</span> Live · ${a.live} old · Goal: ${esc(a.goal)}</div>
          </div></div>
          <div class="ad-right"><span class="pill ${a.verdict}">${a.label}</span><span class="chev">▼</span></div>
        </div>
        <div class="stat-grid" onclick="toggle(${i})">${stats}</div>
        <div class="ad-strip">
          ${rest.length?`<div><div class="strip-label">Other creatives</div><div class="other-thumbs">${thumbs}</div></div>`:""}
          <div class="counts">${c.keep?`<span class="chip keep">${c.keep} keep</span>`:""}${c.watch?`<span class="chip watch">${c.watch} watch</span>`:""}${c.remove?`<span class="chip remove">${c.remove} remove</span>`:""}</div>
        </div>
      </div>
    </div>
    <div class="ad-detail"><div class="action-bar"><span class="pill ${a.verdict}">${a.label}</span><p>${esc(a.action)}</p></div><div class="creative-grid">${grid}</div></div>
  </article>`;
}
function toggle(i){document.querySelectorAll(".ad-row").forEach((r,j)=>r.classList.toggle("open",j===i?!r.classList.contains("open"):false));}
document.getElementById("list").innerHTML=ADS.map(rowHTML).join("");
</script>
</body>
</html>
